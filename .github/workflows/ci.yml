name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Run Lint
      run: npm run lint
      continue-on-error: true # Don't block build if lint fails on first try
      
    - name: Run Build
      run: npm run build
      
    - name: Run Tests
      run: npm test
      continue-on-error: true
