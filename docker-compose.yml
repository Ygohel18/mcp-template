services:
  mcp-server:
    build: .
    container_name: mcp-server
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - MCP_TRANSPORT=sse # Default to SSE for external access
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge
